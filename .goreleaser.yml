version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/xtime-conv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: xtime-conv
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: '{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}'

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: '🚀 Features'
      regexp: '^feat:'
      order: 0
    - title: '🐛 Bug Fixes'
      regexp: '^fix:'
      order: 1
    - title: '📝 Documentation'
      regexp: '^docs:'
      order: 2
    - title: '🔨 Other'
      order: 999

release:
  github:
    owner: MichurinDev
    name: xtime-conv
  draft: false
  prerelease: auto
